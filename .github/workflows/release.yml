name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers when pushing a tag like v0.1.0

permissions:
  contents: write # Needed for creating a release

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest # M1/M2/M3 (arm64)
            target: aarch64-apple-darwin
          - os: macos-latest # Cross-compile for Intel (x86_64)
            target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ==================
      # Windows Build
      # ==================
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Dynamically create professional artifact name
          $VERSION = "${{ github.ref_name }}"
          $TARGET = "${{ matrix.target }}"
          $ASSET_NAME = "PlotRedox-$VERSION-$TARGET.zip"
          
          # Compress the executable
          Compress-Archive -Path target/${{ matrix.target }}/release/plot-redox.exe -DestinationPath $ASSET_NAME
          
          # Pass the asset name to the next steps
          echo "ASSET_NAME=$ASSET_NAME" >> $env:GITHUB_ENV

      # ==================
      # macOS Build
      # ==================
      - name: Install cargo-bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        run: cargo install cargo-bundle

      - name: Build App Bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Ad-hoc code sign (macOS)
        if: startsWith(matrix.os, 'macos')
        # Using a wildcard *.app because cargo-bundle respects the capitalized name in Cargo.toml
        run: codesign --force --deep -s - target/${{ matrix.target }}/release/bundle/osx/*.app

      - name: Package (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          # Dynamically create professional artifact name
          VERSION="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          ASSET_NAME="PlotRedox-${VERSION}-${TARGET}.zip"
          
          # Use `ditto` to preserve .app structure and permissions
          ditto -c -k --sequesterRsrc --keepParent target/${{ matrix.target }}/release/bundle/osx/*.app $ASSET_NAME
          
          # Pass the asset name to the next steps
          echo "ASSET_NAME=$ASSET_NAME" >> $GITHUB_ENV

      # ==================
      # Upload Artifacts
      # ==================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}